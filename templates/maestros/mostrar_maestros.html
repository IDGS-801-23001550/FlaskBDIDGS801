{% extends "layout.html" %}

{% block container %}

<div class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default">
    
    <a href="/maestros/registrar" class="text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">Nuevo Registro</a>

    <table class="w-full text-sm text-left rtl:text-right text-body">
        <thead class="text-sm text-body bg-neutral-secondary-medium border-b border-default-medium">
            <tr>
                <th scope="col" class="px-6 py-3 font-medium">
                    Nombre
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Apellidos
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Especialidad
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Correo
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Action
                </th>
            </tr>
        </thead>

        <tbody>
          {%for maestro in prof%}
            <tr class="bg-neutral-primary-soft border-b  border-default">
                <th scope="row" class="px-6 py-4 font-medium text-heading whitespace-nowrap">
                    {{maestro.nombre}}
                </th>
                <td class="px-6 py-4">
                    {{maestro.apellidos}}
                </td>
                <td class="px-6 py-4">
                    {{maestro.especialidad}}
                </td>
                <td class="px-6 py-4">
                    {{maestro.email}}
                </td>
                <td class="px-6 py-4">
                  <a href="/maestros/modificar?matricula={{maestro.matricula}}" class="font-medium text-fg-warning-subtle hover:underline">Editar</a>
                    <a href="/maestros/detalles?matricula={{maestro.matricula}}" class="font-medium text-blue-700 hover:underline">Detalles</a>
                    <a href="/maestros/eliminar?matricula={{maestro.matricula}}" class="font-medium text-danger hover:underline">Eliminar</a>
                </td>
            </tr>
            {%endfor%}
        </tbody>
    </table>
</div>


{% endblock %}
